name: Benchmark

on:
  workflow_dispatch:  # manual trigger from Actions tab
  pull_request:
    types: [labeled, synchronize, reopened]

jobs:
  benchmark:
    # On PR: only run if the PR carries the `benchmark` label. Manual
    # dispatch always runs. Keeps CI cheap for unrelated PRs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'benchmark'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - { embedding: hash,    rerank: none,            label: "hash" }
          - { embedding: default, rerank: none,            label: "default" }
          - { embedding: default, rerank: ms-marco-minilm, label: "default-rerank" }
          - { embedding: bge,     rerank: none,            label: "bge" }
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Smriti + sentence-transformers
        run: |
          pip install -e ".[dev]"
          pip install sentence-transformers

      - name: Run LongMemEval-S (${{ matrix.config.label }})
        run: |
          LIMIT_FLAG=""
          if [ "${{ matrix.config.embedding }}" = "bge" ]; then
            LIMIT_FLAG="--limit 160"
          fi
          RERANK_FLAG=""
          if [ "${{ matrix.config.rerank }}" != "none" ]; then
            RERANK_FLAG="--rerank ${{ matrix.config.rerank }}"
          fi
          python bench/run_longmemeval.py \
            --embedding ${{ matrix.config.embedding }} \
            $RERANK_FLAG \
            $LIMIT_FLAG

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.config.label }}
          path: bench/progress.log
